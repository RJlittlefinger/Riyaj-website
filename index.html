<nav class="navbar">
  <a href="#">Home</a>
  <a href="#">About</a>

  <div class="dropdown">
    <button onclick="toggleMenu()" class="dropbtn">Services ⬇</button>
    <div id="dropdownMenu" class="dropdown-content">
      <a href="#">Web Design</a>
      <a href="#">Data Entry</a>
      <a href="#">Excel Work</a>
    </div>
  </div>

  <a href="#">Contact</a>
</nav>

<style>
.navbar {
  background: #333;
  text-align: center;
  padding: 10px;
}

.navbar a, .dropbtn {
  color: white;
  padding: 10px 15px;
  text-decoration: none;
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.dropdown {
  display: inline-block;
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  background: white;
  min-width: 150px;
  left: 0;
}

.dropdown-content a {
  color: black;
  padding: 10px;
  display: block;
  text-decoration: none;
}

.dropdown-content a:hover {
  background: lightgray;
}
</style>

<script>
function toggleMenu() {
  var menu = document.getElementById("dropdownMenu");
  if (menu.style.display === "block") {
    menu.style.display = "none";
  } else {
    menu.style.display = "block";
  }
}
</script>
