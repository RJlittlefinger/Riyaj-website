<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* Navbar */
.navbar {
  background: #333;
  text-align: center;
  padding: 10px;
}

.navbar a, .dropbtn {
  color: white;
  padding: 10px 15px;
  text-decoration: none;
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.dropdown {
  display: inline-block;
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  background: white;
  min-width: 150px;
}

.dropdown-content a {
  color: black;
  padding: 10px;
  display: block;
  text-decoration: none;
}

.dropdown-content a:hover {
  background: lightgray;
}

/* Content */
.content {
  padding: 40px;
  text-align: center;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <a href="#">Home</a>
  <a href="#">About</a>

  <div class="dropdown">
    <button onclick="toggleMenu()" class="dropbtn">Services ⬇</button>
    <div id="menu" class="dropdown-content">
      <a href="#">Web Design</a>
      <a href="#">Data Entry</a>
      <a href="#">Excel Work</a>
    </div>
  </div>

  <a href="#">Contact</a>
</div>

<!-- Content -->
<div class="content">
  <h1>Welcome to My Website 🚀</h1>
  <p>This is my first live website!</p>
</div>

<script>
function toggleMenu() {
  var x = document.getElementById("menu");
  if (x.style.display === "block") {
    x.style.display = "none";
  } else {
    x.style.display = "block";
  }
}
</script>

</body>
</html>
